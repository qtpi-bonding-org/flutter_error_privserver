name: flutter_error_privserver
description: Privacy-preserving error reporting library for Flutter apps using cubit_ui_flow. Captures error types and stack traces without PII.
version: 0.1.0
homepage: https://github.com/your-org/flutter_error_privserver
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cubit_ui_flow:
    git: 
      url: https://github.com/qtpi-bonding-org/flutter_cubit_ui_flow.git
      ref: 6692e2d
  flutter_bloc: ^8.1.0
  uuid: ^4.0.0
  crypto: ^3.0.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter: